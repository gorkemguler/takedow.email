version: '3.8'

services:
  takedown-email:
    build: .
    container_name: takedown-email-app
    ports:
      - "5000:5000"
    volumes:
      - takedown_data:/app/data
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      - DATABASE_PATH=/app/data/takedown_logs.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - takedown-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: takedown-email-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - takedown-email
    restart: unless-stopped
    networks:
      - takedown-network
    profiles:
      - production

volumes:
  takedown_data:
    driver: local

networks:
  takedown-network:
    driver: bridge
